<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StackMind — Intelligent Problem Solving</title>
  <meta name="description" content="StackMind: An open-source, multi-step reasoning AI agent for complex problem solving with full transparency." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />

  <!-- Styles -->
  <link rel="stylesheet" href="/css/design-system.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo-mark">
          <svg width="28" height="28" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="40" height="40" rx="8" fill="#18181B"/>
            <path d="M12 28V12h4l4 10 4-10h4v16h-3V17l-3.5 9h-3L15 17v11h-3z" fill="#fff"/>
          </svg>
        </div>
        <span class="logo-text">StackMind</span>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <div class="nav-section">
          <a href="#/" class="nav-item" data-route="/">
            <span class="material-symbols-outlined">home</span>
            <span class="nav-label">Home</span>
          </a>
          <a href="#/sessions" class="nav-item" data-route="/sessions">
            <span class="material-symbols-outlined">insights</span>
            <span class="nav-label">Solutions</span>
          </a>
          <a href="#/knowledge-graph" class="nav-item" data-route="/knowledge-graph">
            <span class="material-symbols-outlined">hub</span>
            <span class="nav-label">Knowledge Graph</span>
          </a>
          <a href="#/memory" class="nav-item" data-route="/memory">
            <span class="material-symbols-outlined">memory</span>
            <span class="nav-label">Memory</span>
          </a>
          <a href="#/settings" class="nav-item" data-route="/settings">
            <span class="material-symbols-outlined">settings</span>
            <span class="nav-label">Settings</span>
          </a>
          <a href="#/api-docs" class="nav-item" data-route="/api-docs">
            <span class="material-symbols-outlined">terminal</span>
            <span class="nav-label">API Docs</span>
          </a>
        </div>

        <div class="nav-section nav-section--bottom">
          <a href="#/" class="nav-item" data-route="/support">
            <span class="material-symbols-outlined">help</span>
            <span class="nav-label">Support</span>
          </a>
          <a href="#/" class="nav-item" data-route="/docs">
            <span class="material-symbols-outlined">menu_book</span>
            <span class="nav-label">Documentation</span>
          </a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="system-status" id="system-status">
          <span class="status-dot status-dot--checking"></span>
          <span class="status-text">Connecting...</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
      <!-- Views are rendered here by the router -->
    </main>
  </div>

  <!-- Scripts -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
