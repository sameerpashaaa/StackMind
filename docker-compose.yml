# ──────────────────────────────────────────────────────────────────
# StackMind — Docker Compose (Production Stack)
# ──────────────────────────────────────────────────────────────────
# Usage:
#   cp .env.example .env         # fill in your API keys
#   docker compose up --build -d
#   Open http://localhost in your browser
# ──────────────────────────────────────────────────────────────────

services:
  # ── Backend (FastAPI + Gunicorn) ─────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stackmind-backend
    env_file: .env
    environment:
      - PORT=8000
      - WORKERS=4
      - LOG_LEVEL=info
      - CORS_ORIGINS=http://localhost,http://localhost:80
    ports:
      - "8000:8000"
    volumes:
      - memory-data:/app/data/memory
      - logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      chromadb:
        condition: service_healthy

  # ── Frontend (Nginx + Vite build) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stackmind-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── ChromaDB (Vector Store) ─────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: stackmind-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

# ── Named Volumes ─────────────────────────────────────────────────
volumes:
  memory-data:
    driver: local
  chroma-data:
    driver: local
  logs:
    driver: local
